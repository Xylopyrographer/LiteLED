name=LiteLED
version=3.1.0
author=Xylopyrographer
maintainer=Xylopyrographer <xylopyrographer@gmail.com>
sentence=High performance library for driving one or more WS2812 and other types of RGB LED strips via RMT or PARLIO.
paragraph=Provides hardware-accelerated control via RMT or the PARLIO parallel-IO peripheral. Supports multiple independent strips; arbitrary colour orders; DMA transfers; interrupt priority; PSRAM buffer allocation; and the LiteLEDpioGroup class for driving multiple strips in perfect sync from a single PARLIO TX unit. Requires an ESP32 SoC with an RMT peripheral; PARLIO features require SOC_PARLIO_SUPPORTED (e.g. ESP32-C6, ESP32-H2). Works concurrently with the WiFi system when run on dual-core versions. Drives RGBW strips with auto white-channel calculation.
category=Display
url=https://github.com/Xylopyrographer/LiteLED
architectures=esp32
providesIncludes=LiteLED.h
